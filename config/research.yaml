  rrg-lens-score-swap:
    title: RRG 監控清單 · 日線+盤中加權分 · Top-N 升級換倉
    status: active
    run_scripts:
      - scripts/backfill_rrg_lens_backtest_data.py
      - scripts/run_rrg_lens_score_swap.py
      - scripts/run_rrg_lens_score_swap_phase1_parallel.sh
      - scripts/summarize_rrg_lens_score_swap.py
    report_dir: reports/research/rrg
    parent_strategy: rrg-mono-hold7
    baseline_strategy: rrg-mono-hold7
    # 假說全文見本檔 topics 註解 · 採納前不得寫入 config/strategy.yaml
    # 對照基準：rrg-mono-hold7（3 槽 · hold7 · mono fresh · seg_last）· 待 run_rrg_lens_score_swap.py
    # score = alpha × 盤中 RRG 分 + (1-alpha) × 日線 Lens 分 · 候選池 ⊆ prior_close_lens（PIT）
    #
    # A · 加權分 alpha（日線 vs 盤中）
    # H-A1：盤中 RRG 動量對輪動股有領先性；alpha 過低會滯後 → 補測 0.5 / 0.9 / 1.0（純盤中）
    # H-A2：Lens 含共識／flow，日線權重過高會排上已充分反映標的 → 低 alpha 區 0.3–0.5（若允許）
    # H-A3：最佳 alpha 隨廣度分區變化（強勢偏盤中、過熱偏日線）→ alpha × breadth_zone 矩陣
    # H-A4：盤中排序鍵 seg_last / disp / rs_momentum 對 alpha 最優解有交互作用
    #
    # B · 候選門檻 candidate_gate
    # H-B1：lens_only 太寬雜訊多；mono_tier2 太窄錯過 Lens 先發 → 五檔為主軸
    # H-B2：mono fresh 當日是 hold7 對齊條件 → 增 mono_fresh_1d 與 mono_fresh_2d 對照
    # H-B3：mono_fresh_2d 降假突破但晚一日 → 比較勝率 vs 覆蓋率
    # H-B4：leading_improving 適合滿槽換倉，不適合空槽建倉 → 分開測建倉／換倉 gate
    # H-B5：四框架收斂 ≥ 2 標的換倉邊際貢獻更高 → lens_convergence_ge2
    # H-B6：僅大盤同向（regime_aligned）允許換入 → overlay filter 維度
    #
    # C · 槽位 max_slots
    # H-C1：邊際標的品質隨槽位遞減 → 除 3 / 5 外測 1 槽集中
    # H-C2：5 槽 + max_swaps_per_day=1 → 槽位閒置 → 5 槽應聯動放寬換倉上限
    # H-C3：動態槽位（強勢 5、過熱 3）→ max_slots × breadth_zone
    #
    # D · 換倉觸發 swap_trigger · 賣出腿 sell_leg
    # H-D1：beat_held_best 保守減 churn，但可能抱最弱腿太久 → 對照 beat_held_median / beat_held_worst
    # H-D2：challenger 僅略優於 worst 時換倉不值得 → score_margin δ ∈ {0, 5, 10, 20}
    # H-D3：應賣分數下滑最快腿 → sell_leg: held_worst vs held_fastest_decay
    # H-D4：空槽 Top-1 建倉、滿槽才換倉 → 與 hold7 開倉對齊
    #
    # E · 盤中節奏 rebalance_interval_min · confirm_bars
    # H-E1：15 分鐘為台股輪動合理折衷 → 對照 5 / 30 / 60 分鐘
    # H-E2：confirm_bars=2 濾 1 分 K 雜訊 → 對照 1 / 3
    # H-E3：09:00–09:30 不換倉（價格發現）→ no_swap_before: "09:30"
    # H-E4：定點 10:00 / 11:00 / 13:00 優於連續輪詢 → 銜接 rrg-mono-hold3-tactical
    #
    # F · 出場 exit_quadrants · min_hold_days · max_hold_days
    # H-F1：weakening / lagging 早於 hold7 止損輪動衰竭 → 對照僅 lagging
    # H-F2：min_hold_days=1 易來回洗 → 對照 2 / 3 / 7
    # H-F3：未觸發象限出場則最長持有 7 日（對齊父策略）→ max_hold_days: 7
    # H-F4：先出場再評 challenger（exit-first）vs 先換倉再出場
    #
    # G · 換倉頻率 max_swaps_per_day
    # H-G1：每日 1 次壓制過度交易 → 對照 0 / 1 / 2 / unlimited
    # H-G2：max_slots=5 且每日 1 次 → 退化成緩慢再平衡
    #
    # H · PIT watchlist_pit
    # H-H1：prior_close_lens 為正確 PIT 邊界（固定）
    # H-H2：盤中分可用當日 1 分 K，候選池必須 ⊆ 昨日監控清單 → 洩漏測試 sanity
    # H-H3：新進觀察是否允許當日盤中進池 → allow_intraday_new_to_watchlist false / true
    #
    # I · RRG 參數 rrg_length
    # H-I1：父策略已凍結 LENGTH=20，Phase 1 不動 → Phase 2 才掃 15 / 25
    # H-I2：盤中分用當日軌跡延伸，不另縮 window
    #
    # J · 環境分層（銜接 rrg-mono-breadth-study）
    # H-J1：強勢區換倉 + 較高 alpha 有正邊際
    # H-J2：過熱區應少換倉或提高 min_hold_days
    # H-J3：超賣／偏弱／中性應關閉或降槽
    #
    # Phase 4 · 換倉診斷（候選池不足時 beat_held_* 永不觸發 · 見 sweep_swap_diagnostic）
    # → Phase 3 swap_trigger × sell_leg × score_margin · 廣度分層 hold-out
    # 採納門檻（vs hold7 ~7.0% 均超額 · ~59% 勝率）：均超額 +0.5–1.0pp · 強勢+過熱分桶均正 · PIT 通過
    sweep:
      alpha: [0.6, 0.7, 0.75, 0.8, 0.85, 1.0]
      max_slots: [3, 5]
      candidate_gate:
        - lens_only
        - tier2
        - mono_tier2
        - mono_fresh_2d
        - leading_improving
    fixed:
      rrg_length: 20
      rebalance_interval_min: 15
      confirm_bars: 2
      swap_trigger: beat_held_best
      sell_leg: held_worst
      exit_quadrants: [weakening, lagging]
      min_hold_days: 1
      max_hold_days: 7
      max_swaps_per_day: 1
      watchlist_pit: prior_close_lens
      no_swap_before: "09:30"
    sweep_phase2:
      min_hold_days: [1, 2, 3, 7]
      max_swaps_per_day: [0, 1, 2]
      rebalance_interval_min: [5, 15, 30]
    sweep_phase3:
      swap_trigger: [beat_held_best, beat_held_median, beat_held_worst]
      sell_leg: [held_worst, held_fastest_decay]
      score_margin: [0, 5, 10, 20]
    sweep_swap_diagnostic:
      entry_gate: tier2
      swap_gate: lens_only
      min_hold_days: 1
      swap_trigger: [beat_held_worst, beat_held_median, beat_held_best]
      confirm_bars: [1, 2]
      max_swaps_per_day: [1, 2, 99]
      score_margin: [0]

