  # 出場 sweep（scripts/run_rrg_mono_intraday_exit_sweep.py）：
  # E1/E2 · 象限轉弱連續 N 日 · E3/E4 · 位移連續 3 日左下 ll_streak
  # E5 · mono 加速中斷 · E6/E7 · D4 未再加速 accel_d4 · 觸發日 1 分 K scale/full_rrg 賣點
  # 採納前不得寫入 config/strategy.yaml · 需 stock_kbar_1m backfill 才可信盤中腿
  # C 腿 sweep 假說（scripts/run_rrg_mono_intraday_c_sweep.py）：
  # H-C1 · 30m 輪詢較 5m 降噪 · H-C2 · shortlist 盤中 full RRG 重算
  # H-C3 · confirm_bars 連續居前才建倉 · H-C4 · D+1 加速 → D+2 盤中建倉
  # 假說全文見本檔 topics 註解 · 採納前不得寫入 config/strategy.yaml
  # H1：日線 mono fresh（LENGTH=20）在 hold1–3 仍具超額 · H2：T+1 盤中進場優於 D4 收盤
  # 參考：JdK 日線戰術 RRG · TV 社群 RS-Momentum 領先 · 不建週線層

