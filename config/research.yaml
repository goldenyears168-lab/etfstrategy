# Research 層 · 探索性研究主題（SSOT）
# 術語：docs/terminology.md §4
# sweep / 矩陣 / 假說 · 採納後凍結規格寫入 config/strategy.yaml

version: research-v2
layer: research

principles:
  - exploratory · sweep · matrix · hypothesis testing
  - adoption graduates frozen spec to config/strategy.yaml
  - no daily close · no production screen until graduated
  - ex-post validation · PIT-safe baselines

