      - scripts/run_c18acc_pool_merge_sweep.py
      - scripts/run_c18acc_breadth_funnel_sweep.py
      - scripts/run_c18acc_breadth_swapday_sweep.py
      - scripts/analyze_c18acc_slot_utilization.py
    report_dir: reports/research/rrg
    parent_strategy: rrg-mono-hold7
    baseline_variant: C18
    # ── C18acc 簡化漏斗 SSOT（20260624 funnel ablation · 去掉不影響回測的層）──
    # 全樣本 2024-01-01～2026-06-22：5.38% 均超額 · 41 swaps · variant_id C18acc
    #
    # A 候選池（PIT · 信號日 T−1 收盤）
    #   ETF 成分 watchlist
    #   → mono tier2：up_right + 終點 leading + disp∈[1,2) + mono_up
    #   → fresh：昨日非 mono tier2、今日新進 mono tier2
    #   → seg_last 排序 · 全池（不裁 top10 · shortlist passthrough）
    #
    # B 進場（空槽補倉）
    #   C0 盤中 · 5m · 信號日 seg_last 以盤中價 scale 排序
    #   confirm_bars=0 或 1 皆可（消融 41/41 腿相同）
    #
    # C 換倉（5m poll · 每日最多 1 次）
    #   min_hold=5 · max_hold=10 · max_swaps_per_day=1
    #   賣：四日平均加速（lookback=4）最負且 < 0
    #   買：seg_last 贏持倉 +0.05 的候選中 · 取四日加速最大（合併單條規則 · 非兩步）
    #
    # 已拿掉／等效 no-op（回測不變）
    #   top10 裁切 · shortlist 再篩（accel>0 · challenger_gate · top-N 重排）
    #   structural_gate=none · decel_gate=false（冠軍本即 off）
    #
    # 不可簡化（消融會動結果）
    #   mono_up / leading / disp / fresh · buy 加速排序 · margin=0.05 · max_swaps=1
    #   拿掉 mono_up −1.69pp · 拿掉 buy_sort −0.07pp · confirm=2 −0.13pp · max_swaps=2 −0.20pp
    #
    # ── 全樣本 2024-01-01 ~ 2026-06-22 · 對照 C18 baseline（内部骨架）──
    # C18（seg_last · margin=0.10 · 無 gate）          4.89% 均超額 · 45 swaps
    #
    # research_champion（最高均超額 · 已採納 strategy.yaml · rrg-mono-swap-accel）：
    #   rrg-mono-swap-accel · C18acc → 5.38% · 41 swaps
    #
    # research_stable（跨期较稳 · 位移 gate · swap 更少）：
    #   C18-dls1 · 4 日位移 down_left gate · seg_last 卖 · margin=0.08
    #   → 5.19% · 33 swaps · 胜台指 59.6%
    #
    # ── 买方加速度 Phase 1–2（20260624）──
    # Phase 2 买排序改「四日加速最大」有效（+0.07pp vs 只比 seg_last）
    # margin sweet spot 0.05
    #
    # ── C18acc vs dls1 稳定性（20260624_c18_acc4_dls1_stability.json）──
    # 全样本 +0.20pp · 2024 C18acc 领先 · 2025 dls1 领先 · 子区间 C18acc 胜 3/5
    #
    # ── 候选池 · 无 leading（20260624_rrg_mono_swap_accel_candidate_pool.json）──
    # 三轴保留：up_right + mono_up + disp∈[1,2) · 仅拿掉终点 leading
    # 换仓规则不变（四日加速对称 · margin=0.05）· 全样本 2024-01-01 ~ 2026-06-22：
    #   C18acc fresh leading      5.38% · 41 swaps（冠军 · 维持）
    #   C18acc-mono leading 全池  5.09% · 45 swaps（-0.29pp · 略差）
    #   C18acc-muf mono_up fresh    4.45% · 65 swaps（-0.93pp）
    #   C18acc-mu  mono_up 全池     3.81% · 71 swaps（-1.57pp · 池更大 churn 高）
    # 结论：leading 对 C18acc 仍有正边际；no_leading 在 hold7 空槽 fallback 有效，
    #       但 score swap 全程放宽候选池会稀释换仓质量 · 不采纳 mono_up 替代 fresh
    #
    # ── 无 leading top10 加速度筛选 sweep（20260624_c18acc_no_lead_accel_sweep.json）──
    # 基池 mono_up_fresh（三轴 · 无 leading）· top10 改加速度排序 / >0 / v·a>0 / top3/5 / margin
    # 多数变体结果相同（~3.65% · 70 swaps）：muf 池日均 ~3.5 档 · 常 ≤10 · 筛序几乎无差
    # 最佳无 leading：C18acc-nla-muf-arap-t3（top3 · 加速>0）3.82% · -1.56pp · 仍不及 C18acc
    # margin=0.08 / top3 略减 churn；mu 全池 / lb3 更差 · 不采纳
    #
    # ── 漏斗消融（20260624_c18acc_funnel_ablation.json）──
    # top10 裁切恒 no-op（池 max=8）· 买合并规则=冠军 · buy_sort_key 拿掉 -0.07pp
    # mono_tier2 池 +0.15pp · signal_seg_last 建仓 +0.11pp · 组合 mono-sigseg 全样本 +0.26pp
    # mono_up 拿掉 -1.69pp · max_swaps=2 非等价 · confirm=2 -0.13pp
    #
    # ── C18acc-mono-sigseg 稳定性（20260624_c18acc_mono_sigseg_stability.json）──
    # 全样本 +0.26pp（5.64% vs 5.38%）· breadth gate PASS（strong/overbought 均正且优于冠军）
    # 分年：2024 +0.37pp · 2025 -0.94pp · 2026 +2.73pp（n=34）→ 2025 明显回撤
    # 子区间 3/5 胜 · H1-24~25H1 -0.35pp · breadth 偏弱/中性落后 -1.4/-0.6pp
    # 结论：全样本增益不稳 · 不替换 C18acc 冠军 · 保留为 research optional combo
    #
    # ── 三方向漏斗合并（20260624_c18acc_pool_merge_sweep.json）──
    # D1 entry fresh / swap mono_tier2：5.09% · 45 swaps（-0.29pp · 与 C18acc-mono 同）
    #   换仓腿仅 7/41 前缀一致 · 2025 落后 0.96pp · 不采纳分池
    # D2 fresh∪(mono_tier2∧ā>0)：5.53% · 46 swaps（+0.15pp · 2019+ 亦 +0.11pp）
    #   2025 仅 3.68%（-1.14pp）· overbought +1.13pp 但 strong/neutral 走弱 · 不稳
    # D3 加强 C（同池 fresh）：margin 0.06 / recent_accel_up / v·a>0 与冠军完全相同（41/41 腿）
    #   pos-accel 略差 -0.05pp（40 swaps · 28/41 前缀一致）· margin 0.07/0.08 更差
    # 结论：维持 C18acc 冠军 · 无变体在 2024–2026 分年均稳定优于冠军
    #
    # ── 廣度漏斗層（20260624_c18acc_breadth_funnel_sweep.json）──
    # 單一 spec · breadth_pool_mode / entry|swap zone gate（非雙策略交替）
    # 冠军 5.38% · 41 swaps · n=183
    # entry gate（仅 strong/overbought 进场）：5.45% · 27 swaps（+0.07pp · n=109）
    #   2024 3.98 / 2025 4.54 均落后 · 2026 持平 · 少交易不稳
    # swap gate（仅 hot 日换仓）：3.86% · 28 swaps（-1.53pp）→ neutral 日换仓是冠军利润来源
    # pool mono_in_hot_zones（进+换同切 mono/fresh）：5.91% · 42（+0.53pp · 2019+ 仅 +0.39pp）
    #   2025 4.63 vs 4.82（-0.19pp）· strong/overbought 区 +0.7/+1.1pp 但 neutral 不变
    # swap_mono_in_hot_zones（进 fresh · hot 换 mono）：5.49% · 43（+0.10pp · 7/41 前缀）
    # swap_union_accel_in_hot_zones：与 swap_mono 完全相同（43 swaps · 7/41）· D2 union 无增量
    # 结论：无变体 2024–2026 分年全胜 · 维持 C18acc 冠军
    #   swap gate 证伪「只在强势换」· neutral 区 mean excess 5.78% 是核心 alpha 池
    #
    # ── 換倉日 vs 進場日 zone 路由（20260624_c18acc_breadth_swapday_sweep.json）──
    # breadth_challenger_pool_mode: entry_day | swap_day · breadth_swap_zone_date: swap_day | entry_day
    # 冠军 5.38% · 41 swaps
    # entry-day pool mono-hot：5.91% · 42（+0.53pp · 2019+ 5.26% · 2025 4.63 落后 -0.19pp）
    # swap-day pool mono：5.49% · 43（+0.10pp · 7/41 前缀 · 2019+ 4.95%）
    # swap-day pool union：与 swap-day mono 完全相同（43 · 7/41）
    # swap-day gate：3.86% · 28（-1.53pp）· entry-day gate：3.87% · 29（-1.52pp）→ 双 gate 均证伪
    # 结论：swap-day 路由不优于 entry-day pool mono-hot · 无变体 2024–2026 分年全胜 · 维持 C18acc
    #
    # ── 已拒絕 ──
    # 候选 3 日 fresh · 四日加速 3 日窗 · min_hold=4 提早换 · 纯 v·a 卖 · down_left+加速卖 等
    #
    # 报告 JSON：20260624_c18_*_sweep.json · breadth hold-out 见 rrg_mono_swap_accel_breadth_zones.*
    # 2026-06-24 graduation stack：config/strategy.yaml · daily brief · pipeline · site_content
    #
    # ── 空槽頻率分析（20260624_c18acc_slot_utilization.json）──
    # 全樣本 2024-01-01～2026-06-23（596 日）· MAX_SLOTS=3 · min_hold=5 · max_hold=10
    #   3/3 填滿：85.2%（508 日）
    #   2/3 填：12.4%（74 日）← 主要空槽型態（max_hold 出場 + fresh=0 同日）
    #   1/3 填：1.7%（10 日）
    #   0/3 填：0.7%（4 日）· 均出現於回測啟動暖機期
    #   均 fill：2.822 / 均 empty：0.178
    #   fresh pool=0 的交易日：40.1%（239 日）！但因持倉仍在，不直接造成空槽
    #   均 fresh pool 大小：1.02 檔/日 · 池極窄
    #   2026 子期（111 日）：3/3 填滿 81.1% · 2/3 填 18.0% · fresh=0 佔 39.6%
    #   union_accel 池：3/3 填滿 86.2%（+1.0pp） · mean_excess 5.53%（+0.15pp · 全樣本）
    #                   2026 與 champion 完全相同（35 腿 · 9 swaps）
    # 結論：空槽不頻繁（14.8% 任意空槽）但 fresh pool 極窄是結構性弱點；
    #       若強制填倉需引入次優候選池，需驗證不稀釋換倉品質
    #
    # ── 空槽填倉 sweep 假說（待執行）──
    # 目標：降低「2/3 填滿日（12.4%）」· 評估強制填倉對 mean_excess 的邊際影響
    #
    # H1 · 進場 union / 換倉 fresh（entry_pool/swap_pool 分池）
    #   config: entry_pool="fresh_union_accel", swap_pool="fresh"
    #   已知：full union 替換 +0.15pp（但 2025 不穩）；此版僅 entry 放寬
    #   預期空槽改善：moderate（union 池約擴 ~0.5 檔/日）
    #   Alpha 風險：low-moderate（換倉仍用 fresh · 不稀釋 swap 品質）
    #   快速執行：C18acc_POOL_MERGE_SWEEP 加入 entry_pool="fresh_union_accel", swap_pool="fresh" 一條
    #
    # H2 · 延長 candidate_lookback（4→6 日）
    #   config: candidate_lookback=6（fresh 定義窗加長 → 更多股票當日仍算 fresh）
    #   預期空槽改善：moderate（池窗加長後 fresh pool=0 比例可能降至 ~25%）
    #   Alpha 風險：moderate（窗加長可能納入已趨弱標的）
    #   快速執行：ScoreSwapCConfig(..., candidate_lookback=6) 一條
    #
    # H3 · entry fallback pool（新 config flag · 僅設計不實作）
    #   config: entry_fallback_pool="mono_tier2"（fresh=0 時降級用 mono_tier2 補倉）
    #   機制：simulate_score_swap_c _fill_empty_slots 前檢查 entry_shortlist；
    #         若為空且有 entry_fallback_pool → 用 fallback_pool rows 補倉（swap 規則不變）
    #   預期空槽改善：high（理論上可將 2/3 填滿天 → 3/3 · 但需確認進場品質）
    #   Alpha 風險：moderate（fallback 候選四軸合格但非 fresh 動能）
    #   實作成本：ScoreSwapCConfig 加 entry_fallback_pool 欄位 · simulate 加 ~10 行
    #
    # H4 · 延長 max_hold（10→12 或 15 日）
    #   config: max_hold_days=12 or 15
    #   預期空槽改善：low-moderate（減少強制出場 → 減少空槽觸發）
    #   Alpha 風險：low（少交易但持倉期延長 · 可能錯過輪換）
    #   快速執行：ScoreSwapCConfig(..., max_hold_days=12) · ScoreSwapCConfig(..., max_hold_days=15)
    #
    # H5 · breadth_pool_mode="mono_in_hot_zones"（重新驗證 · 附空槽統計）
    #   config: breadth_pool_mode="mono_in_hot_zones"
    #   已知：全樣本 +0.53pp · 2025 落後 -0.19pp（不穩）
    #   重跑目的：補錄空槽改善統計（之前未量化槽位利用率）
    #   Alpha 風險：high（2025 穩定性未過）· 不建議採納，僅作資訊參考
    #
    # 優先執行順序：H1 → H2 → H4（均在現有框架內，不需改程式）；H3 需少量程式
    # 執行腳本：scripts/run_c18acc_slot_fill_sweep.py
    #   使用 C18acc_POOL_MERGE_SWEEP 框架 + slot_snapshots 參數 · 同步輸出槽位統計
    # 結果 JSON：reports/research/rrg/20260624_c18acc_slot_fill_sweep.json
    #
    # ── 執行結果摘要（2024-01-01 ~ 2026-06-23 · n=183腿 · champion mean_excess=5.38%）──
    # H1 entry-union  : excess=5.83% Δ+0.45pp · 3/3 full 86.2%（+1.0pp）· 2025 微降（建議觀察 · 已複驗）
    # H2 lb6          : excess=5.30% Δ-0.08pp · 3/3 full  5.2%（-80pp）· lb=6 反而縮窄 fresh 池
    # H3 fallback-mono: excess=5.26% Δ-0.12pp · 3/3 full 85.4%（+0.2pp）· 填倉品質稀釋
    # H4a mh12        : excess=4.29% Δ-1.09pp · 3/3 full 85.7%（+0.5pp）· 持倉延長損益下降顯著
    # H4b mh15        : excess=4.82% Δ-0.56pp · 3/3 full 91.1%（+5.9pp）· 最大槽位改善但 alpha 犧牲
    # H5 breadth-hot  : excess=5.91% Δ+0.53pp · 3/3 full 85.7%（+0.5pp）· 參考用 · 2025 不穩
    # 結論：僅強制填倉難以同時改善 alpha · H1 entry-union 為目前最優（入場放寬 · 換倉保品質）
    #
    # ── H1 entry-union · 2025 穩定性複驗（2024-01-01~2025-12-31 · 20260624_c18acc_h1_2025_stability.json）──
