# Daily close workflow — Facts (etf-daily) + Regime four-axis diagnostic
# Executable: scripts/daily_sync.sh + src/etf_daily_report.py + src/regime_daily_brief.py

version: pipeline-v2
id: daily_close
title: 收盤 ETF 日報

trigger:
  schedule: "16:30 Asia/Taipei Mon-Fri"
  entry: scripts/1630收盤雷達.command
  wrapper: scripts/daily_sync.sh

outputs:
  - reports/daily/etf-daily/daily_brief.md
  - reports/daily/regime/daily_brief.md
  - reports/daily/{date}_etf_daily.md
  - reports/daily/{date}_rrg_mono_daily.md
  - reports/daily/rrg_mono_daily.md
  - reports/daily/{date}_rrg_mono_swap_accel_daily.md
  - reports/daily/rrg_mono_swap_accel_daily.md
  - reports/daily/{date}_vcp_funnel_specs_daily_brief.md
  - reports/daily/vcp_funnel_specs_daily_brief.md
  - data/stocks.db
  - data/stocks.db · rrg_universe_scores（screen_kind=close）
  - data/stocks.db · stock_daily_lens · lens_daily_alert
  - stock_research.stock_daily_lens · lens_daily_alert（Supabase · RUN_SUPABASE_LENS_SYNC=1）

phases:
  - id: ingest_market
    gate: MARKET
    title: L1 Ingest · market (optional)
    implemented_in: scripts/daily_sync.sh
    nodes:
      - id: core_market
        label: core market (6 ETFs + benchmarks, TEJ)
        module: src/query_stock_prices.py
        fail_kind: aux

      - id: etf_signal
        label: ETF signal snapshot (FinMind)
        module: src/sync_etf_signal.py
        env_flag: ENABLE_FINMIND_SIGNAL
        env_default: "0"
        fail_kind: aux

      - id: tech_risk
        label: tech risk context (TSM/SOX/TX gap)
        module: src/sync_tech_risk_context.py
        fail_kind: aux

      - id: morning_futures
        label: morning futures snapshot (TX/TE live gap)
        module: src/sync_morning_futures.py
        fail_kind: aux

  - id: ingest_holdings
    gate: HOLDINGS
    title: L1 Ingest · holdings + ETF 日報
    implemented_in: scripts/daily_sync.sh
    nodes:
      - id: holdings_ezmoney
        label: ETF holdings EZMoney (2)
        module: src/sync_etf_holdings.py
        fail_kind: holdings

      - id: holdings_kgifund
        label: ETF holdings KGIFund (2)
        module: src/sync_etf_holdings.py
        fail_kind: holdings

      - id: holdings_capitalfund
        label: ETF holdings CapitalFund (2)
        module: src/sync_etf_holdings.py
        fail_kind: holdings

      - id: holdings_nomura
        label: ETF holdings Nomura (1)
        module: src/sync_etf_holdings.py
        fail_kind: holdings

      - id: holdings_changes
        label: holdings changes (L1 diff, quiet when --human)
        module: src/sync_etf_holdings.py
        runner: timed_pipe
        fail_kind: aux

      - id: rrg_universe_close
        label: RRG universe close snapshot (per-stock SQLite + Supabase)
        module: src/rrg_universe_snapshot.py
        run_script: scripts/run_rrg_universe_close.py
        env_flag: RUN_RRG_UNIVERSE_CLOSE
        env_default: "1"
        requires:
          - constituent stock_daily_bars for as_of（建議 RUN_STOCK_MARKET_SYNC=1）
        fail_kind: aux

      - id: rrg_mono_daily
        label: RRG mono daily brief + slot confirm（併入 16:30 daily_sync）
        module: src/rrg_mono_daily_brief.py
        run_script: scripts/run_rrg_mono_daily_brief.py
        env_flag: RUN_RRG_MONO_DAILY
        env_default: "1"
        fail_kind: aux

      - id: rrg_mono_swap_accel_daily
        label: RRG mono swap-accel（C18acc）16:30 收盤診斷 brief（Scheme A）
        module: src/rrg_mono_swap_accel_daily_brief.py
        run_script: scripts/run_rrg_mono_swap_accel_daily_brief.py
        env_flag: RUN_RRG_MONO_SWAP_ACCEL_DAILY
        env_default: "1"
        fail_kind: aux

      - id: etf_daily_report
        label: ETF 日報 write + terminal summary
        module: src/etf_daily_report.py

      - id: copytrade_l1h9_screen
        label: 00981A L1H9 daily screen brief
        module: src/copytrade_l1h9_daily.py
        runner: timed_pipe
        fail_kind: aux

      - id: regime_daily_brief
        label: Regime four-axis diagnostic daily brief
        module: src/regime_daily_brief.py
        runner: timed_pipe
        fail_kind: aux

      - id: vcp_funnel_close
        label: VCP funnel close screen + Pivot Gate / Coil Close brief
        module: src/vcp_funnel_specs_daily.py
        run_script: scripts/run_vcp_funnel_close.py
        env_flag: RUN_VCP_FUNNEL_CLOSE
        env_default: "1"
        requires:
          - constituent stock_daily_bars for as_of（建議 RUN_STOCK_MARKET_SYNC=1）
        fail_kind: aux

      - id: stock_daily_lens
        label: cross-layer lens + delta + convergence → Supabase
        module: src/stock_daily_lens.py
        run_script: scripts/run_stock_daily_lens.py
        env_flag: RUN_STOCK_DAILY_LENS
        env_default: "1"
        requires:
          - etf_daily_report
          - regime_daily_brief
          - rrg_universe_close
          - vcp_funnel_close
        fail_kind: aux

  - id: human_digest
    gate: SHOW_REPORT
    title: Terminal summary (etf_daily_report --human)
    implemented_in: scripts/daily_sync.sh
