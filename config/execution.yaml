# Execution layer · 執行層（券商 API · 帳務 · 委託）
# 密碼與 API Key 僅放 .env，勿寫入本檔
# SDK 文件：https://www.fbs.com.tw/TradeAPI/docs/trading/quickstart

version: execution-v1
layer: execution

broker:
  id: fubon_neo
  sdk_version: "2.2.8"
  python_venv: .venv-fubon
  python_max: "3.13"
  wheel: CAFubon/fubon_neo-2.2.8-cp37-abi3-macosx_11_0_arm64.whl

account:
  user_id_env: FUBON_USER_ID
  password_env: FUBON_PASSWORD
  cert_path_env: FUBON_CERT_PATH
  cert_password_env: FUBON_CERT_PASSWORD
  api_key_env: FUBON_API_KEY
  default_cert_path: CAFubon/N125801238/N125801238.pfx

reports:
  root: reports/execution
  snapshots: reports/execution/snapshots
  intents: reports/execution/intents

# 策略層 → 執行層契約（JSON SSOT · schema: execution-intent-v1）
# 策略腳本寫入 reports/execution/intents/{strategy_id}_{as_of}.json
# 執行：.venv-fubon/bin/python scripts/execution/submit_intents.py <path> --dry-run|--submit
intent:
  schema_version: execution-intent-v1
  default_dir: reports/execution/intents
