# 複製為 data/investment_policy.yaml（data/ 在 .gitignore，勿提交含個人資金的檔案）
version: ips-v1
capital_ntd: 100000
max_single_weight_pct: 40
max_theme_weight_pct: 50
# 每日開盤配置：風控池 → 評分 Top N → 等權（見 portfolio_engine）
max_daily_positions: 5
daily_weight_mode: equal
equal_position_weight_pct: 20
exclude_entry_signals:
  - 暫不進場
  - 乖離過大
exclude_pm_buckets:
  - 回避
exclude_chip_tags:
  - 外資賣超背離
  - 籌碼背離
  - 同步賣超
# TSM ADR ≤ 此門檻：折讓加深（vol_tsm_adr_weak_adj）＋科技標的縮倉（adr_weak_size_scale），不擋單
tsm_adr_block_new_tech_pct: -2.0
require_evening_sync_ok: true
min_risk_reward: 1.5
breakout_buffer_pct: 0.5
pull_buffer_pct: 1.0
wait_buffer_pct: 0.75
stop_buffer_pct: 2.0
breakout_risk_pct: 3.0
open_execution_policy: compare_at_open
open_price_source: auction_0900
favorable_open_action: market_rod
unfavorable_open_action: limit_rod

# A：評分 → 基礎耐心折扣（%）；分數越高折扣越小
score_patience_bands:
  - min_score: 75
    discount_pct: 2.0
  - min_score: 70
    discount_pct: 3.0
  - min_score: 65
    discount_pct: 3.5
  - min_score: 60
    discount_pct: 3.5
  - min_score: 0
    discount_pct: 4.5
# B：價位型態加權（觀望略加深，拉回略積極）
entry_patience_multiplier:
  突破: 1.0
  拉回: 0.9
  觀望: 1.05

# 掛單折扣上下限（看漲每日掛單：約 2%～6%）
min_limit_discount_pct: 2.0
max_limit_discount_pct: 6.0
# 波動微調：52 週位置、beta、隔夜環境
vol_strong_near_high_pct: -5.0
vol_strong_near_high_adj: -0.5
vol_far_from_high_pct: -8.0
vol_far_from_high_adj: 0.5
vol_beta_high: 1.3
vol_beta_high_adj: 0.5
vol_beta_low: 1.1
vol_beta_low_adj: -0.25
vol_gap_wide_pct: 0.5
vol_gap_wide_adj: 0.5
vol_tsm_adr_weak_adj: 0.5
# 日內震盪指標（ATR14 / 14日振幅 / 14日報酬標準差）取 max → swing 微調
vol_swing_high_pct: 3.5
vol_swing_high_adj: 0.35
vol_swing_low_pct: 2.0
vol_swing_low_adj: -0.2

# E0.2 執行評估：試撮 gap 與縮倉（gap_block=0 表示不啟用極端 gap 擋單）
gap_controls:
  max_open_gap_pct: 3.0
  gap_block_new_entry_pct: 0
  gap_size_multiplier: 0.5
  adr_weak_size_scale: 0.7

evaluation_defaults:
  allow_intraday_overwrite_approved: false

# Phase 3：risk_budget 依停損距離反推 qty（等權 suggested_ntd 仍為上限 cap）
sizing:
  mode: equal_cap
  risk_budget_pct_per_trade: 1.0
  use_stop_distance_for_qty: false
  # equal_cap：qty = floor(等權20% × size_scale / ref)；限價不抬高，結構停損僅參考
